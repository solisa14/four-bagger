# Development profile - H2 in-memory database with debug logging
spring:
  datasource:
    url: jdbc:h2:mem:fourbagger;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

app:
  jwt:
    secret-key: ZGV2ZWxvcG1lbnRfc2VjcmV0X2tleV9mb3JfdGVzdGluZw==
    expiration-ms: 3600000
    refresh-token:
      expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
  cookie:
    secure: false

logging:
  level:
    root: INFO
    com.github.solisa14.fourbagger: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
