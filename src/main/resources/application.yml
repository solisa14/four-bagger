spring:
  application:
    name: four-bagger-api
  datasource:
    url: jdbc:h2:mem:fourbagger;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-ms: 3600000 # 1 hour
      refresh-token:
        expiration-ms: 604800000 # 7 days
    cookie:
      secure: false
