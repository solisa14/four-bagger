spring:
  application:
    name: four-bagger-api
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    defer-datasource-initialization: true

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-ms: 3600000 # 1 hour
      refresh-token:
        expiration-ms: 604800000 # 7 days
    cookie:
      secure: true
