# Test configuration - overrides main application.yml during tests
spring:
  application:
    name: four-bagger-api
  datasource:
    url: jdbc:tc:postgresql:14-alpine:///fourbagger
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  task:
    scheduling:
      enabled: false
  web:
    error:
      include-message: always
      include-binding-errors: always

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
  security:
    jwt:
      secret-key: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      expiration-ms: 3600000
      refresh-token:
        expiration-ms: 604800000
    cookie:
      secure: false

server:
  port: 8080

logging:
  level:
    root: WARN
